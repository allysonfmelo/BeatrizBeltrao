# ===========================================
# Studio Beatriz Beltrão — CI/CD Pipeline
# Builds Docker image, deploys to VPS via Docker Swarm,
# and deploys Trigger.dev tasks to production.
# ===========================================

name: Deploy Production

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "packages/**"
      - "assets/**"
      - "docker-compose.prod.yml"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/bb-api

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.vars.outputs.sha_short }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set variables
        id: vars
        run: echo "sha_short=$(echo $GITHUB_SHA | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.sha_short }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-trigger:
    name: Deploy Trigger.dev Tasks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable corepack
        run: corepack enable && corepack prepare pnpm@9.15.4 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm --filter @studio/shared --filter @studio/db build

      - name: Deploy Trigger.dev tasks
        working-directory: apps/api
        env:
          TRIGGER_ACCESS_TOKEN: ${{ secrets.TRIGGER_ACCESS_TOKEN }}
        run: npx trigger.dev@latest deploy

  # Deploy API to VPS está desabilitado: o runner do GitHub Actions não tem
  # conectividade na porta 22 devido ao firewall externo da infra. O build da
  # imagem Docker continua sendo publicado no GHCR por `build-and-push` acima,
  # e o deploy na VPS é feito manualmente com:
  #   ssh root@<vps> "docker service update --image ghcr.io/<owner>/bb-api:<tag> --with-registry-auth bb_api"
  # Para reabilitar: resolver o bloqueio de rede (abrir porta 22, self-hosted
  # runner ou VPN mesh) e descomentar o job abaixo.
