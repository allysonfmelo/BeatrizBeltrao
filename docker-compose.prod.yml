# ===========================================
# Studio Beatriz Beltrão — Docker Swarm Stack
# Deploy: docker stack deploy -c docker-compose.prod.yml bb
# ===========================================

version: "3.8"

services:
  api:
    image: ghcr.io/allysonmelo/bb-api:latest
    networks:
      - network_swarm_public
    env_file:
      - .env.production
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M
          cpus: "0.25"
      labels:
        - traefik.enable=true
        - traefik.docker.network=network_swarm_public
        - traefik.http.routers.bb-api.rule=Host(`api.biabeltrao.com.br`)
        - traefik.http.routers.bb-api.entrypoints=websecure
        - traefik.http.routers.bb-api.tls.certresolver=letsencryptresolver
        - traefik.http.services.bb-api.loadbalancer.server.port=3001

networks:
  network_swarm_public:
    external: true
